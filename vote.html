<!DOCTYPE html>
<html>
<head>
<title>Vote Counter</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
    background:#f5f5f5;
}

h1{
    margin-bottom:40px;
}

.container{
    display:flex;
    justify-content:center;
    gap:80px;
}

.candidate{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    width:150px;
}

.count{
    font-size:40px;
    margin:15px 0;
}

button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#3498db;
    color:white;
}

button:hover{
    background:#2980b9;
}

.reset{
    margin-top:40px;
    background:#e74c3c;
}

.reset:hover{
    background:#c0392b;
}
</style>
</head>

<body>

<h1>Vote Counter</h1>

<div class="container">

<div class="candidate">
<h2>John</h2>
<p class="count" id="john">0</p>
<button onclick="increaseVote('john')">Vote</button>
</div>

<div class="candidate">
<h2>Mary</h2>
<p class="count" id="mary">0</p>
<button onclick="increaseVote('mary')">Vote</button>
</div>

</div>

<button class="reset" onclick="resetVotes()">Reset Votes</button>

<script>

let votes = {
    john: 0,
    mary: 0
};

function increaseVote(candidate){
    votes[candidate]++;
    document.getElementById(candidate).innerText = votes[candidate];
}

function resetVotes(){
    for(let candidate in votes){
        votes[candidate] = 0;
        document.getElementById(candidate).innerText = 0;
    }
}

</script>

</body>
</html>
